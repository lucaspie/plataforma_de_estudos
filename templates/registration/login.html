{% extends 'base.html' %}

{% block title %}Entrar - EduAdapt{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600">Bem-vindo</h1>
            <p class="text-gray-500 mt-2">Acesse sua conta para começar a treinar</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                    <p class="text-red-700 text-sm">Usuário ou senha incorretos. Tente novamente.</p>
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Usuário</label>
                <input type="text" name="username" id="id_username" required
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 shadow-sm transition">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" name="password" id="id_password" required
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 shadow-sm transition">
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150">
                ENTRAR NO SISTEMA
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Ainda não tem conta? <a href="#" class="text-indigo-600 font-semibold hover:underline">Cadastre-se</a>
        </div>
    </div>
</div>
{% endblock %}
