{% extends 'base.html' %}
{% block title %}Redefinir Senha{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
<div class="w-full max-w-md bg-[var(--bg-card)] p-8 rounded-xl shadow border border-[var(--border-color)]">

<h1 class="text-2xl font-bold mb-4">Redefinir senha</h1>

<form method="post" class="space-y-4">
{% csrf_token %}
{{ form.email.label_tag }}
{{ form.email }}

<button type="submit"
class="w-full py-3 rounded text-white font-bold"
style="background: var(--color-primary)">
Enviar link de redefinição
</button>

</form>
</div>
</div>
{% endblock %}
