{% extends 'base.html' %}
{% block title %}Editar Usuário{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-[var(--bg-card)] p-6 rounded-xl shadow border border-[var(--border-color)]">

<h1 class="text-xl font-bold mb-6">Editar {{ usuario.username }}</h1>

<form method="post" class="space-y-4">
{% csrf_token %}

{% for field in form %}
<div>
<label class="block text-sm font-medium mb-1">{{ field.label }}</label>
{{ field }}
</div>
{% endfor %}

<button type="submit"
class="w-full py-2 rounded text-white font-bold"
style="background: var(--color-primary)">
Salvar Alterações
</button>
</form>

</div>
{% endblock %}
