{% extends "base.html" %}

{% block title %}Skill Graph - EduAdapt{% endblock %}

{% block content %}
<div class="space-y-8 animate-fade-in">

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-[var(--text-main)]">
                Skill Graph <span class="text-indigo-600 text-2xl">🕸️</span>
            </h1>
            <p class="text-[var(--text-muted)] mt-1">
                Visualização dinâmica das dependências e pré-requisitos de conhecimento.
            </p>
        </div>
        <div class="flex items-center gap-3">
            <a href="{% url 'skill_graph_list' %}"
                class="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                Novas Dependências
            </a>
        </div>
    </div>

    <div class="relative group">
        <div class="absolute top-4 left-4 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-3 rounded-xl border border-[var(--border-color)] text-xs text-[var(--text-muted)] pointer-events-none transition-opacity group-hover:opacity-100 opacity-60">
            <p class="flex items-center gap-2">🖱️ <span>Arraste os nós para organizar</span></p>
            <p class="flex items-center gap-2 mt-1">🔍 <span>Scroll para zoom</span></p>
        </div>

        <div id="cy" style="height: 650px;" 
             class="bg-[var(--bg-card)] rounded-[2rem] border border-[var(--border-color)] shadow-sm overflow-hidden transition-all hover:shadow-md">
        </div>
    </div>

</div>

<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

<script>
    const nodes = {{ nodes|safe }};
    const edges = {{ edges|safe }};

    const elements = [];

    nodes.forEach(n => {
        elements.push({
            data: {
                id: "n" + n.id,
                label: n.label
            }
        });
    });

    edges.forEach(e => {
        elements.push({
            data: {
                source: "n" + e.source,
                target: "n" + e.target,
                peso: e.peso
            }
        });
    });

    const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: elements,
        style: [
            {
                selector: 'node',
                style: {
                    'label': 'data(label)',
                    'background-color': '#6366f1', // Indigo 600
                    'text-valign': 'center',
                    'color': '#ffffff',
                    'font-family': 'Inter, system-ui, sans-serif',
                    'font-size': '12px',
                    'font-weight': 'bold',
                    'width': '120px',
                    'height': '120px',
                    'text-wrap': 'wrap',
                    'text-max-width': '100px',
                    'border-width': 4,
                    'border-color': '#e0e7ff',
                    'overlay-padding': '6px',
                    'ghost': 'yes',
                    'ghost-offset-y': 2,
                    'ghost-opacity': 0.1
                }
            },
            {
                selector: 'edge',
                style: {
                    'curve-style': 'bezier',
                    'target-arrow-shape': 'triangle',
                    'line-color': '#94a3b8', // Slate 400
                    'target-arrow-color': '#94a3b8',
                    'width': 2,
                    'label': 'data(peso)',
                    'font-size': '10px',
                    'color': '#64748b',
                    'text-background-opacity': 1,
                    'text-background-color': '#ffffff',
                    'text-background-padding': '2px',
                    'text-background-shape': 'roundrectangle',
                    'edge-distances': 'node-position'
                }
            },
            {
                selector: 'node:selected',
                style: {
                    'background-color': '#4338ca', // Indigo 700
                    'border-color': '#6366f1',
                    'border-width': 6
                }
            }
        ],
        layout: {
            name: 'breadthfirst',
            directed: true,
            padding: 50,
            spacingFactor: 1.2
        },
        wheelSensitivity: 0.2
    });

    // Ajusta o gráfico ao redimensionar a janela
    window.addEventListener('resize', function(){
        cy.fit();
    });
</script>

<style>
    /* Estilo de animação igual ao painel */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 0.4s ease-out;
    }

    /* Garante que o texto do nó não quebre o layout */
    canvas {
        cursor: grab;
    }
    canvas:active {
        cursor: grabbing;
    }
</style>
{% endblock %}
