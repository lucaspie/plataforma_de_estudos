{% extends "base.html" %}
{% block title %}Matérias - EduAdapt{% endblock %}

{% block content %}
<div class="space-y-8 animate-fade-in">
    <div>
        <h1 class="text-3xl font-extrabold text-[var(--text-main)]">📚 Matérias</h1>
        <p class="text-[var(--text-muted)] mt-2">Selecione uma disciplina para ver os tópicos e fundamentos.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for materia in materias %}
        <a href="{% url 'materia_detail_alunos' materia.id %}"
           class="group p-8 bg-[var(--bg-card)] rounded-2xl shadow-sm border border-[var(--border-color)] hover:border-indigo-500 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
            
            <div class="w-12 h-12 bg-indigo-100 dark:bg-indigo-900/30 rounded-xl flex items-center justify-center text-indigo-600 mb-4 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>

            <h2 class="font-bold text-xl text-[var(--text-main)] group-hover:text-indigo-600 transition-colors">
                {{ materia.nome }}
            </h2>
            <p class="text-sm text-[var(--text-muted)] mt-2 italic">Ver tópicos e questões →</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
